name: Sync Upstream

on:
  schedule:
    - cron: '0 0 * * *' # 每天 UTC 00:00 (台灣時間上午 8 點) 自動執行
  workflow_dispatch: # 允許手動觸發

jobs:
  sync-fork:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Sync Fork
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh repo sync ${{ github.repository }} -b main
